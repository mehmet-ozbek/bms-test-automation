name: Smoke Tests (Scheduled)

on:
  workflow_dispatch:
  schedule:
    - cron: "2 11 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Smoke Tests
        run: mvn -B clean test -Psmoke

      - name: Generate Allure Report
        if: always()
        run: mvn -B allure:report
