name: Smoke Tests (Scheduled)

on:
  workflow_dispatch:
  schedule:
    - cron: "35 05 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Smoke Tests
        run: mvn -B clean test -Psmoke

      - name: Generate Allure Report
        if: always()
        run: mvn -B allure:report
        
      - name: Upload Everything in Target
        if: always() # Hata olsa da olmasa da çalıştır
        uses: actions/upload-artifact@v4
        with:
          name: target-directory-backup
          path: target/ # Sadece screenshots değil, tüm target'ı bana getir  

      - name: Install Zip
        run: zip -r report-data.txt target/

      - name: Archive Allure Report
        run: zip -r allure-report.zip target/
        
      - name: Send Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "QA Test Report - Success!"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          secure: true
          
          body: "Testler başarıyla tamamlandı. Detaylı Allure raporu ektedir. Ayrıca Raporu GitHub Actions sayfasındaki Artifacts kısmından: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}  indirebilirsiniz."
          
      
